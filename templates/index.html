<!DOCTYPE html>
<html>
<head>

<title>Resume Analyzer AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.card{
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:30px;
}

button{
width:100%;
}

</style>

</head>

<body>

<div class="card" style="width:500px">

<h1>Resume Analyzer AI</h1>

<form action="/analyze" method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Upload Resume (PDF)</label>
<input type="file" class="form-control" name="resume" required>
</div>

<div class="mb-3">
<label class="form-label">Paste Job Description</label>
<textarea class="form-control" name="job_desc" rows="5"></textarea>
</div>

<button class="btn btn-primary">Analyze Resume</button>

</form>

</div>

</body>
</html>
